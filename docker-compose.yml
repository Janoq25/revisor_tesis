version: '3.8'

services:
  n8n:
    image: n8nio/n8n:2.19.1
    restart: always
    env_file:
      - .env.n8n
    # Desde dentro del contenedor, "localhost" NO es tu máquina: usar host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: always
    ports:
      - "3001:3000" # Expuesto al host para que el Next.js local pueda alcanzarlo
    command:
      - "gotenberg"
      - "--api-port=3000"

  frontend:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      DATABASE_URL: postgresql://postgres:fD5-JkLcxMYU8V2dhBE1@db.yeytdbzukgmsaogorrfj.supabase.co:5432/postgres
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/revision-tesis
      ARCHIVO_PUBLIC_BASE_URL: http://frontend:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    command:
      - sh
      - -lc
      - npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  n8n_data:
